<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1.0" />
  <title>TrackerHub • Register</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>

  <main class="auth">
    <section class="auth-card">
      <div class="auth-brand">
        <div class="logo" aria-hidden="true">
          <!-- simple cap icon -->
          <svg width="22" height="22" viewBox="0 0 24 24" fill="none">
            <path d="M12 3 2 8l10 5 10-5-10-5Z" stroke="#fff" stroke-width="2" stroke-linejoin="round"/>
            <path d="M6 11v6c0 1 3 3 6 3s6-2 6-3v-6" stroke="#fff" stroke-width="2" stroke-linejoin="round"/>
          </svg>
        </div>
        <b>TrackerHub</b>
      </div>

      <h2>Create Student Account</h2>

      <form class="form" onsubmit="event.preventDefault(); location.href='dashboard.html';">
        <div>
          <label>Full Name</label>
          <input type="text" placeholder="Enter your full name" required />
        </div>
        <div>
          <label>Email</label>
          <input type="email" placeholder="Enter your email" required />
        </div>
        <div>
          <label>Password</label>
          <input type="password" placeholder="Create a password" required />
        </div>

        <button class="btn btn-primary" type="submit">Register</button>
      </form>

      <div class="auth-foot">
        Already have an account? <a href="register.html">Login</a>
      </div>
    </section>
  </main>

</body>
</html>
